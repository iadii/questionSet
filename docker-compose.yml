version: '3.8'

services:
  db:
    image: postgres:16
    container_name: walmartprep_db
    environment:
      POSTGRES_USER: adiivats
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: walmartprep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adiivats -d walmartprep"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: walmartprep_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/walmartprep
      - SPRING_DATASOURCE_USERNAME=adiivats
      - SPRING_DATASOURCE_PASSWORD=password123
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
